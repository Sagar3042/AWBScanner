<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AWB Pro Scanner</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    
    <script src="https://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap');
        
        body {
            background-color: #000;
            font-family: 'Inter', sans-serif;
            margin: 0;
            padding: 0;
            height: 100vh;
            overflow: hidden;
            color: white;
        }

        /* Full-screen Camera Container */
        #reader {
            width: 100vw;
            height: 100vh;
            position: fixed;
            top: 0;
            left: 0;
            z-index: 1;
        }

        #reader video {
            object-fit: cover;
            width: 100%;
            height: 100%;
        }

        /* Glassmorphism Scan Frame */
        .scan-overlay {
            position: absolute;
            inset: 0;
            background: radial-gradient(circle, transparent 130px, rgba(0, 0, 0, 0.7) 130px);
            z-index: 5;
            pointer-events: none;
        }

        .scan-frame {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 260px;
            height: 260px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 32px;
            z-index: 10;
        }

        /* Neon Corners */
        .corner {
            position: absolute;
            width: 45px;
            height: 45px;
            border: 4px solid #3b82f6;
            border-radius: 12px;
            filter: drop-shadow(0 0 8px #3b82f6);
        }
        .tl { top: -2px; left: -2px; border-right: 0; border-bottom: 0; }
        .tr { top: -2px; right: -2px; border-left: 0; border-bottom: 0; }
        .bl { bottom: -2px; left: -2px; border-right: 0; border-top: 0; }
        .br { bottom: -2px; right: -2px; border-left: 0; border-top: 0; }

        /* Animated Scanning Line */
        .scan-line {
            width: 100%;
            height: 4px;
            background: linear-gradient(to right, transparent, #3b82f6, transparent);
            position: absolute;
            top: 0;
            left: 0;
            animation: scan-move 2.5s infinite ease-in-out;
            box-shadow: 0 0 20px 2px rgba(59, 130, 246, 0.8);
        }

        @keyframes scan-move {
            0%, 100% { top: 0; }
            50% { top: 100%; }
        }

        /* PIP Mode Layout Adjustments */
        body.floating-mode .scan-frame {
            width: 140px;
            height: 140px;
            border-radius: 16px;
        }
        body.floating-mode .scan-overlay {
            background: none;
        }

        /* Custom Scrollbar for History */
        .custom-scroll::-webkit-scrollbar {
            width: 4px;
        }
        .custom-scroll::-webkit-scrollbar-thumb {
            background: #3b82f6;
            border-radius: 10px;
        }
    </style>
</head>
<body>

    <div id="reader"></div>

    <div class="scan-overlay" id="overlay-darken"></div>
    <div class="scan-frame">
        <div class="corner tl"></div><div class="corner tr"></div>
        <div class="corner bl"></div><div class="corner br"></div>
        <div class="scan-line"></div>
    </div>

    <div id="standard-ui" class="fixed bottom-0 left-0 w-full p-6 bg-black/40 backdrop-blur-2xl border-t border-white/10 rounded-t-[40px] z-20 flex flex-col items-center">
        
        <div id="last-scan" class="mb-4 text-blue-400 font-semibold text-center bg-blue-500/10 border border-blue-500/20 px-6 py-3 rounded-2xl w-full truncate shadow-xl">
            Awaiting first scan...
        </div>
        
        <button onclick="triggerPIP()" class="w-full bg-blue-600 hover:bg-blue-700 active:scale-95 text-white font-bold py-4 rounded-2xl shadow-lg shadow-blue-500/30 transition-all flex items-center justify-center gap-3 mb-4">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 16H6a2 2 0 01-2-2V6a2 2 0 012-2h8a2 2 0 012 2v2m-6 12h8a2 2 0 002-2v-8a2 2 0 00-2-2h-8a2 2 0 00-2 2v8a2 2 0 002 2z" /></svg>
            Floating Mode (PIP)
        </button>
        
        <div class="w-full">
            <div class="flex justify-between items-center mb-2 px-1">
                <span class="text-gray-400 text-xs font-bold uppercase tracking-widest">Recent Scans</span>
                <span id="history-count" class="text-blue-400 text-xs font-bold bg-blue-500/10 px-2 py-0.5 rounded">0</span>
            </div>
            <div class="h-28 overflow-y-auto custom-scroll space-y-2" id="history-list">
                </div>
        </div>
    </div>

    <div id="floating-ui" class="fixed top-2 right-2 z-50 hidden">
        <button onclick="exitPIP()" class="bg-red-500/90 hover:bg-red-600 text-white w-10 h-10 rounded-full shadow-2xl flex items-center justify-center font-bold border-2 border-white/20 backdrop-blur-md">
            ✕
        </button>
    </div>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const isFloating = urlParams.get('mode') === 'floating';
        const historyData = [];

        // UI Mode Setup
        if (isFloating) {
            document.body.classList.add('floating-mode');
            document.getElementById('standard-ui').classList.add('hidden');
            document.getElementById('overlay-darken').classList.add('hidden');
            document.getElementById('floating-ui').classList.remove('hidden');
        }

        // Camera Engine Optimization
        const html5QrCode = new Html5Qrcode("reader");
        const qrConfig = { 
            fps: 30, // 30 FPS for instant scanning
            qrbox: isFloating ? { width: 140, height: 140 } : { width: 260, height: 260 },
            aspectRatio: 1.0,
            videoConstraints: {
                facingMode: "environment",
                focusMode: "continuous",
                width: { ideal: 1280 },
                height: { ideal: 720 }
            }
        };

        function onScanSuccess(decodedText) {
            // 1. Native Bridge Actions
            if (window.AndroidInterface) {
                AndroidInterface.copyToClipboardNative(decodedText);
                AndroidInterface.playBeepSound();
                AndroidInterface.vibratePhone();
            }

            // 2. UI Updates (If not in floating mode)
            if (!isFloating) {
                updateUI(decodedText);
            }
            
            // 3. Pause for duplicate scans
            html5QrCode.pause(true);
            setTimeout(() => html5QrCode.resume(), 1800);
        }

        function updateUI(text) {
            const lastScan = document.getElementById('last-scan');
            lastScan.innerText = "✓ Copied: " + text;
            lastScan.classList.replace('text-blue-400', 'text-green-400');
            lastScan.classList.add('scale-105');
            
            setTimeout(() => {
                lastScan.classList.replace('text-green-400', 'text-blue-400');
                lastScan.classList.remove('scale-105');
            }, 800);

            // History Update
            historyData.unshift(text);
            const list = document.getElementById('history-list');
            const item = document.createElement('div');
            item.className = "bg-white/5 border border-white/10 p-3 rounded-xl flex items-center justify-between text-sm animate-fade-in";
            item.innerHTML = `<span class="truncate pr-4">${text}</span><span class="text-gray-500 text-[10px]">${new Date().toLocaleTimeString()}</span>`;
            list.prepend(item);
            document.getElementById('history-count').innerText = historyData.length;
        }

        // Initialize Camera
        html5QrCode.start({ facingMode: "environment" }, qrConfig, onScanSuccess)
        .catch(err => {
            console.error("Camera fail:", err);
            document.getElementById('last-scan').innerText = "Camera Permission Error!";
        });

        // Bridge Logic
        function triggerPIP() {
            if (window.AndroidInterface) AndroidInterface.startFloatingService();
            else alert("Available only inside the Android App.");
        }

        function exitPIP() {
            if (window.AndroidInterface) AndroidInterface.stopFloatingService();
        }
    </script>

    <style>
        .animate-fade-in { animation: fadeIn 0.3s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</body>
</html>
